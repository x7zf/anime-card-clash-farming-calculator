<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACC Farming Calculator</title>
<style>
body{font-family:Inter,Arial,sans-serif;background:#0b1022;color:white;display:flex;justify-content:center;padding:30px}
.card{max-width:900px;width:100%;background:rgba(255,255,255,.06);padding:24px;border-radius:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
input{width:100%;padding:12px;border-radius:12px;border:1px solid #444;background:#111827;color:white}
.result{margin-top:12px;padding:14px;border-radius:16px;background:rgba(255,255,255,.05)}
.bar{height:12px;background:#222;border-radius:999px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,#8b5cf6,#00dcff)}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="card">
<h1>ACC Farming Calculator</h1>
<div class="grid">
<div><label>Current amount</label><input id="current" placeholder="Number" type="number"></div>
<div><label>Goal amount needed</label><input id="goal" placeholder="Number" type="number"></div>
<div><label>Rewards</label><input id="reward" placeholder="Number" type="number"></div>
<div><label>Time per reward (seconds)</label><input id="time" placeholder="Number" type="number"></div>
</div>
<div class="result"><b>Remaining:</b> <span id="remaining">0</span></div>
<div class="result"><b>Rewards Needed:</b> <span id="needed">0</span></div>
<div class="result"><b>Time Needed:</b> <span id="duration">0 minutes</span></div>
<div class="result"><b>Progress:</b> <span id="progressText">0%</span><div class="bar"><div class="fill" id="fill"></div></div></div>
</div>
<script>
function fmt(mins){
 mins=Math.round(mins);
 let d=Math.floor(mins/1440),h=Math.floor((mins%1440)/60),m=mins%60;
 let p=[]; if(d)p.push(d+" day"+(d==1?"":"s"));
 if(h)p.push(h+" hour"+(h==1?"":"s"));
 if(m||!p.length)p.push(m+" minute"+(m==1?"":"s"));
 return p.join(" and ");
}
function calc(){
 let c=+current.value||0,g=+goal.value||0,r=+reward.value||0,t=+time.value||0;
 let rem=Math.max(g-c,0);
 let need=r>0?Math.ceil(rem/r):0;
 let mins=need*t/60;
 let prog=g>0?Math.min(c/g*100,100):0;
 remaining.textContent=rem.toLocaleString();
 needed.textContent=need.toLocaleString();
 duration.textContent=fmt(mins);
 progressText.textContent=prog.toFixed(2)+"%";
 fill.style.width=prog+"%";
 localStorage.acc=JSON.stringify({c,g,r,t});
}
[current,goal,reward,time].forEach(x=>x.oninput=calc);
try{
 let d=JSON.parse(localStorage.acc||"{}");
 current.value=d.c||"";goal.value=d.g||"";reward.value=d.r||"";time.value=d.t||"";
}catch(e){}
calc();
</script>
</body>
</html>
